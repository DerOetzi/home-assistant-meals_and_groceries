name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update manifest version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" \
            custom_components/meals_and_groceries/manifest.json

      - name: Create release zip
        run: |
          cd custom_components/meals_and_groceries
          zip -r ../../meals_and_groceries.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: meals_and_groceries.zip
